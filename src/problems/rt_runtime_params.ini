# rt_runtime_params.ini — canonical configuration for the 'rt'
# test problem.  Run with:
#   ./build/bin/chaa --paramsFile=src/problems/rt_runtime_params.ini
# Any key can still be overridden on the command line (--key=value).

problem = rt
geometry = cartesian
nx1 = 64
nx2 = 192
x1min = -0.25
x1max = 0.25
x2min = -0.75
x2max = 0.75
bcX1min = periodic
bcX1max = periodic
bcX2min = reflect
bcX2max = reflect
grav2 = -0.1
integrator = rk3
tstop = 5.0
outFormats = hdf5
