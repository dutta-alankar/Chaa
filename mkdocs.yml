site_name: Chaa
site_description: >-
  Chaa — a performance-portable finite-volume hydrodynamics solver
  written in Chapel
site_url: https://dutta-alankar.github.io/Chaa/
repo_url: https://github.com/dutta-alankar/Chaa
repo_name: dutta-alankar/Chaa

theme:
  name: material
  icon:
    logo: material/tea
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: light mode
  features:
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorial: tutorial.md
  - User guide:
      - Configuration: user-guide/configuration.md
      - Equations & geometry: user-guide/equations.md
      - Numerical schemes: user-guide/numerics.md
      - Output & visualisation: user-guide/output.md
      - Running in parallel: user-guide/parallel.md
  - Set up your own problem: custom-problem.md
  - Architecture & code flow: architecture.md
  - Test suite: tests.md
  - Idefix HD tests in Chaa: idefix.md
  - AthenaPK features in Chaa: athenapk.md
