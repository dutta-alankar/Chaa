# runtime_params.ini — Chaa runtime parameters.
#
# Precedence:  command line (--key=value)  >  this file  >  built-in default.
# Keys use exactly the same names as the command-line flags; [sections] are
# cosmetic and ignored.  Lines starting with # or ; are comments.  Any key
# omitted here falls back to the built-in default (see src/Params.chpl).
# An alternative file can be selected with --paramsFile=<path>.

[run]
problem    = sod
geometry   = cartesian          ; cartesian | cylindrical | polar | spherical
tstop      = 0.2
maxSteps   = 1000000000

[grid]
nx1 = 128
nx2 = 1
nx3 = 1
x1min = 0.0
x1max = 1.0
x2min = 0.0
x2max = 1.0
x3min = 0.0
x3max = 1.0

[physics]
gam   = 1.4                     ; adiabatic index
mu    = 0.0                     ; dynamic viscosity
grav1 = 0.0
grav2 = 0.0
grav3 = 0.0

[numerics]
cfl        = 0.4
recon      = linear             ; constant | linear | limo3 | ppm
limiter    = vanleer            ; minmod | vanleer | mc
riemann    = hllc               ; llf | hll | hllc | exact
integrator = rk2                ; euler | rk2 | rk3

[boundaries]                    ; periodic|outflow|reflect|axis|inflow|userdef
bcX1min = outflow
bcX1max = outflow
bcX2min = outflow
bcX2max = outflow
bcX3min = outflow
bcX3max = outflow

[output]
outDt      = 0.0                ; <= 0: only initial & final dumps
outFormats = txt                ; comma list among txt,vtk,hdf5
outDir     = output
logEvery   = 100
