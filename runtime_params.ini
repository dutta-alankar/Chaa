# runtime_params.ini — Chaa runtime parameters.
#
# Precedence:  command line (--key=value)  >  this file  >  built-in default.
# Keys use exactly the same names as the command-line flags; [sections] are
# cosmetic and ignored.  Lines starting with # or ; are comments.  Any key
# omitted here falls back to the built-in default (see src/Params.chpl).
# An alternative file can be selected with --paramsFile=<path>.

[run]
problem    = sod
geometry   = cartesian          ; cartesian | cylindrical | polar | spherical
tstop      = 0.2
maxSteps   = 1000000000

[grid]
nx1 = 128
nx2 = 1
nx3 = 1
x1min = 0.0
x1max = 1.0
x2min = 0.0
x2max = 1.0
x3min = 0.0
x3max = 1.0
gridX1 = uniform                ; uniform | log | log-dec | stretch
gridX2 = uniform
gridX3 = uniform
stretchX1 = 1.05                ; ratio for 'stretch' (>1 grows, <1 shrinks)
stretchX2 = 1.05
stretchX3 = 1.05
stretchUniX1 = 0                ; uniform anchor block (cells) for 'stretch'
stretchUniX2 = 0
stretchUniX3 = 0

[physics]
gam   = 1.4                     ; adiabatic index
mu    = 0.0                     ; dynamic viscosity
kappa = 0.0                     ; thermal conductivity
scDiff = 0.0                    ; passive-scalar diffusivity
coolLambda0 = 0.0               ; cooling Lambda(T) = L0 * T^coolAlpha
coolAlpha   = 0.5
gravCentral = 0.0               ; GM of a central point mass
forceAmp    = 0.0               ; OU turbulence driving amplitude
nParticles  = 0                 ; Lagrangian tracer particles
sgFourPiG   = 0.0               ; self-gravity: 4*pi*G (>0 enables Poisson)
omegaRot    = 0.0               ; shearing box rotation rate
shearQ      = 1.5               ; shear parameter q
fargo       = off               ; FARGO orbital advection (off | on)
grav1 = 0.0
grav2 = 0.0
grav3 = 0.0

[numerics]
cfl        = 0.4
recon      = linear             ; constant | linear | limo3 | ppm | wenoz
limiter    = vanleer            ; minmod | vanleer | mc
riemann    = hllc               ; llf | hll | hllc | exact
integrator = rk2                ; euler | rk2 | rk3 | vl2

[boundaries]   ; periodic | zero-gradient | reflect | axis | inflow |
               ; outflow-diode | inflow-diode | userdef
bcX1min = zero-gradient
bcX1max = zero-gradient
bcX2min = zero-gradient
bcX2max = zero-gradient
bcX3min = zero-gradient
bcX3max = zero-gradient

[output]
outDt      = 0.0                ; <= 0: only initial & final dumps
outFormats = txt                ; comma list among txt,vtk,hdf5
outDir     = output
logEvery   = 100
