name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (chapel ${{ matrix.chapel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chapel: ["2.8.0"]
    container:
      image: chapel/chapel:${{ matrix.chapel }}
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq make cmake libhdf5-dev > /dev/null
      - name: configure (cmake, with HDF5)
        run: cmake -B build
      - name: compile
        run: cmake --build build
      - name: compile smoke test
        run: ./build/bin/chaa --problem=sod --nx1=64 --tstop=0.01 --outFormats=txt
      - uses: actions/upload-artifact@v4
        with:
          name: chaa-bin
          path: build/bin/chaa

  build-no-hdf5:
    name: build without HDF5
    runs-on: ubuntu-latest
    container:
      image: chapel/chapel:2.8.0
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq make cmake > /dev/null
      - name: configure and compile (HDF5 disabled)
        run: |
          cmake -B build -DCHAA_HDF5=OFF
          cmake --build build
      - name: smoke test
        run: ./build/bin/chaa --problem=sod --nx1=64 --tstop=0.01 --outFormats=txt

  multilocale-combine:
    name: multi-locale run + piece combiner
    runs-on: ubuntu-latest
    container:
      image: chapel/chapel:2.8.0
      options: --shm-size=1gb
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          apt-get update -qq
          apt-get install -y -qq make cmake libhdf5-dev curl \
            python3-numpy python3-h5py > /dev/null
      - name: build gasnet-smp Chapel runtime
        run: |
          export CHPL_HOME=$(chpl --print-chpl-home)
          if [ ! -d "$CHPL_HOME/third-party/gasnet/gasnet-src" ]; then
            curl -sL -o /tmp/chapel.tar.gz \
              https://github.com/chapel-lang/chapel/releases/download/2.8.0/chapel-2.8.0.tar.gz
            tar -xzf /tmp/chapel.tar.gz -C /tmp \
              chapel-2.8.0/third-party/gasnet/gasnet-src
            cp -R /tmp/chapel-2.8.0/third-party/gasnet/gasnet-src \
              "$CHPL_HOME/third-party/gasnet/"
          fi
          cd "$CHPL_HOME"
          CHPL_COMM=gasnet CHPL_COMM_SUBSTRATE=smp make -j4 runtime
      - name: build chaa (single- and multi-locale)
        run: |
          cmake -B build && cmake --build build
          export CHPL_COMM=gasnet CHPL_COMM_SUBSTRATE=smp
          cmake -B build-gasnet && cmake --build build-gasnet
      - name: run 3 locales, combine pieces, compare with 1-locale reference
        run: tests/run_multilocale_combine.sh 3

  test:
    name: ${{ matrix.case }}
    needs: build
    runs-on: ubuntu-latest
    container:
      image: chapel/chapel:2.8.0
    strategy:
      fail-fast: false
      matrix:
        case:
          - sod-1d-cart
          - sod-1d-exact
          - sod-1d-cyl
          - sod-1d-sph
          - twoblast-1d
          - sedov-1d-sph
          - sedov-2d-cyl
          - sedov-2d-sph
          - sedov-3d-cart
          - sedov-3d-sph
          - blast-2d-polar
          - blast-3d-polar
          - riemann2d
          - dmr
          - kh
          - rt
          - vortex
          - taylor-couette
          - cylinder-flow
          - sod-1d-iso
          - khi-2d-iso
          - thermal-diffusion
          - disk-cavity
          - sedov-3d-idefix
          - vortex-limo3
          - vortex-ppm
          - sod-1d-stretch
          - sedov-1d-log
          - sod-from-ini
          - cooling-box
          - linear-wave
          - cloud-wind
          - turbulence-2d
          - vortex-particles
          - vortex-particles-ring
          - restart-sod
          - restart-turbulence
          - ref-sod-idefix
          - ref-sodiso-idefix
          - ref-machref-idefix
          - ref-sedov3d-idefix
          - ref-sod-athenapk
          - epicycle-shearbox
          - epicycle-fargo
          - disk-cavity-fargo
          - selfgrav-kick
          - sod-stretch-anchor
    steps:
      - uses: actions/checkout@v4
      - name: install runtime deps
        run: |
          apt-get update -qq
          apt-get install -y -qq libhdf5-dev python3-numpy python3-h5py > /dev/null
      - uses: actions/download-artifact@v4
        with:
          name: chaa-bin
          path: bin
      - name: run and validate
        run: |
          chmod +x bin/chaa tests/run_case.sh
          tests/run_case.sh ${{ matrix.case }}
