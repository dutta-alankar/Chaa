name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (chapel ${{ matrix.chapel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chapel: ["2.8.0"]
    container:
      image: chapel/chapel:${{ matrix.chapel }}
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq make cmake libhdf5-dev > /dev/null
      - name: configure (cmake, with HDF5)
        run: cmake -B build
      - name: compile
        run: cmake --build build
      - name: compile smoke test
        run: ./build/bin/chaa --problem=sod --nx1=64 --tstop=0.01 --outFormats=txt
      - uses: actions/upload-artifact@v4
        with:
          name: chaa-bin
          path: build/bin/chaa

  build-no-hdf5:
    name: build without HDF5
    runs-on: ubuntu-latest
    container:
      image: chapel/chapel:2.8.0
    steps:
      - uses: actions/checkout@v4
      - name: install build deps
        run: |
          apt-get update -qq
          apt-get install -y -qq make cmake > /dev/null
      - name: configure and compile (HDF5 disabled)
        run: |
          cmake -B build -DCHAA_HDF5=OFF
          cmake --build build
      - name: smoke test
        run: ./build/bin/chaa --problem=sod --nx1=64 --tstop=0.01 --outFormats=txt

  test:
    name: ${{ matrix.case }}
    needs: build
    runs-on: ubuntu-latest
    container:
      image: chapel/chapel:2.8.0
    strategy:
      fail-fast: false
      matrix:
        case:
          - sod-1d-cart
          - sod-1d-exact
          - sod-1d-cyl
          - sod-1d-sph
          - twoblast-1d
          - sedov-1d-sph
          - sedov-2d-cyl
          - sedov-2d-sph
          - sedov-3d-cart
          - sedov-3d-sph
          - blast-2d-polar
          - blast-3d-polar
          - riemann2d
          - dmr
          - kh
          - rt
          - vortex
          - taylor-couette
          - cylinder-flow
          - sod-1d-iso
          - khi-2d-iso
          - thermal-diffusion
          - disk-cavity
          - sedov-3d-idefix
          - vortex-limo3
          - vortex-ppm
          - sod-1d-stretch
          - sedov-1d-log
          - sod-from-ini
          - cooling-box
          - linear-wave
          - cloud-wind
          - turbulence-2d
          - vortex-particles
          - ref-sod-idefix
          - ref-sodiso-idefix
          - ref-machref-idefix
          - ref-sedov3d-idefix
          - ref-sod-athenapk
          - epicycle-shearbox
          - epicycle-fargo
          - disk-cavity-fargo
          - selfgrav-kick
          - sod-stretch-anchor
    steps:
      - uses: actions/checkout@v4
      - name: install runtime deps
        run: |
          apt-get update -qq
          apt-get install -y -qq libhdf5-dev python3-numpy python3-h5py > /dev/null
      - uses: actions/download-artifact@v4
        with:
          name: chaa-bin
          path: bin
      - name: run and validate
        run: |
          chmod +x bin/chaa tests/run_case.sh
          tests/run_case.sh ${{ matrix.case }}
